<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lucci</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #222224;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efed;
    --muted: #888884;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --user-bg: #1e1e20;
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted);
  }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .inner { max-width: 680px; margin: 0 auto; padding: 0 24px; }

  .welcome {
    text-align: center;
    padding: 60px 0 40px;
    animation: fadeUp 0.5s ease both;
  }

  .welcome h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 600;
    letter-spacing: -1px;
    margin-bottom: 10px;
  }

  .welcome h1 span { color: var(--accent); }

  .welcome p {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    max-width: 360px;
    margin: 0 auto 32px;
  }

  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }

  .suggestion {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font);
  }

  .suggestion:hover {
    background: var(--surface2);
    color: var(--text);
    border-color: rgba(200,240,96,0.3);
  }

  .msg {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 500;
  }

  .avatar.ai {
    background: var(--accent-dim);
    border: 1px solid rgba(200,240,96,0.2);
    color: var(--accent);
  }

  .avatar.user-av {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
  }

  .bubble {
    max-width: calc(100% - 52px);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 15px;
    line-height: 1.65;
  }

  .msg.ai .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px var(--radius) var(--radius) var(--radius);
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius) 4px var(--radius) var(--radius);
    color: var(--text);
  }

  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s ease infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .input-area {
    flex-shrink: 0;
    padding: 16px 24px 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .input-wrap {
    max-width: 680px; margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    display: flex; align-items: flex-end; gap: 8px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: rgba(200,240,96,0.4); }

  #user-input {
    flex: 1;
    background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font);
    font-size: 15px; line-height: 1.5;
    resize: none; max-height: 160px;
    padding: 2px 0;
  }

  #user-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px; height: 34px; border-radius: 10px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    opacity: 0.4;
  }

  .send-btn.active { opacity: 1; }
  .send-btn:hover.active { transform: scale(1.05); }
  .send-btn:active.active { transform: scale(0.96); }

  .send-btn svg { width: 16px; height: 16px; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    opacity: 0.6;
  }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .inner { padding: 0 16px; }
    .input-area { padding: 12px 16px 20px; }
    .welcome { padding: 40px 0 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lucci<span>.
