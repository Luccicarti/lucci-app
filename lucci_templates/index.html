<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucci</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#11111f;
  --surface2:#18182a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --text:#eeeef5;
  --muted:#6b6b85;
  --muted2:#4a4a62;
  --accent:#a78bfa;
  --accent2:#7c3aed;
  --lime:#c8f060;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{height:-webkit-fill-available;background:var(--bg)}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  background:var(--bg);color:var(--text);
  font-family:var(--font);display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
.orb{
  position:fixed;border-radius:50%;
  filter:blur(80px);pointer-events:none;z-index:0;
  animation:drift 12s ease-in-out infinite;
}
.orb1{width:300px;height:300px;background:rgba(124,58,237,0.15);top:-80px;right:-80px;animation-delay:0s}
.orb2{width:250px;height:250px;background:rgba(34,211,238,0.08);bottom:100px;left:-60px;animation-delay:-4s}
.orb3{width:200px;height:200px;background:rgba(200,240,96,0.06);top:40%;right:10%;animation-delay:-8s}
@keyframes drift{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(20px,-20px) scale(1.05)}
  66%{transform:translate(-15px,15px) scale(0.95)}
}
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;
}
header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(5,5,10,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
}
.logo{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.logo em{font-style:normal;color:var(--accent)}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(200,240,96,0.08);
  border:1px solid rgba(200,240,96,0.15);
  border-radius:100px;padding:4px 10px;
  font-size:11px;color:var(--lime);
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{
  flex:1;overflow-y:auto;padding:24px 0 16px;
  position:relative;z-index:5;
  -webkit-overflow-scrolling:touch;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.inner{max-width:640px;margin:0 auto;padding:0 16px}
.welcome{padding:40px 0 32px;text-align:center;animation:fadeUp 0.6s ease both}
.welcome-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);
  border-radius:100px;padding:5px 14px;
  font-size:12px;color:var(--accent);margin-bottom:20px;
}
.welcome h1{
  font-size:clamp(30px,7vw,44px);font-weight:700;
  letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px;
}
.welcome h1 .grad{
  background:linear-gradient(90deg,#a78bfa,#22d3ee,#c8f060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome p{font-size:15px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 28px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.suggestion{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:9px 14px;
  font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);
  transition:all 0.2s;text-align:left;
}
.suggestion:hover{background:var(--surface2);color:var(--text);border-color:rgba(167,139,250,0.3);transform:translateY(-1px)}
.s-icon{display:block;font-size:16px;margin-bottom:4px}
.msg{display:flex;gap:10px;margin-bottom:20px;animation:fadeUp 0.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
}
.avatar.ai{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:13px}
.avatar.user-av{background:var(--surface2);border:1px solid var(--border2);color:var(--muted)}
.bubble{max-width:calc(100% - 48px);padding:11px 15px;font-size:15px;line-height:1.65}
.msg.ai .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;color:var(--text);
}
.msg.user .bubble{
  background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(167,139,250,0.15));
  border:1px solid rgba(167,139,250,0.2);
  border-radius:16px 4px 16px 16px;color:var(--text);
}
.typing{display:flex;gap:4px;align-items:center;padding:5px 2px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted2);animation:bounce 1.2s ease infinite}
.typing span:nth-child(2){animation-delay:0.15s}
.typing span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{
  position:relative;z-index:10;
  padding:12px 16px 28px;
  background:rgba(5,5,10,0.9);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
}
.input-outer{max-width:640px;margin:0 auto;position:relative}
.input-glow{
  position:absolute;inset:-1px;border-radius:17px;
  background:linear-gradient(135deg,#7c3aed,#22d3ee,#c8f060);
  opacity:0;transition:opacity 0.3s;z-index:0;
}
.input-outer.focused .input-glow{opacity:0.4}
