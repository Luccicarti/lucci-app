<html lang="en">

    <title>Lucci AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        }

            margin-top: 3px;
        }
        .chat-container {

            padding: 16px;
            display: flex;
            flex-direction: column;

        }

            color: #e0e0e0;
        }

            color: #00ffaa;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }
