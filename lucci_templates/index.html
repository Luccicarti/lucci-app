<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lucci</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #222224;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efed;
    --muted: #888884;
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
    --user-bg: #1e1e20;
    --radius: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html { height: -webkit-fill-available; background: var(--bg); }
  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .logo span { color: var(--accent); }

  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }

  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 32px 0;
    -webkit-overflow-scrolling: touch;
  }

  .inner { max-width: 680px; margin: 0 auto; padding: 0 24px; }

  .welcome { text-align: center; padding: 48px 0 32px; }

  .welcome h1 {
    font-size: 36px; font-weight: 700;
    letter-spacing: -1px; margin-bottom: 10px;
  }

  .welcome h1 span { color: var(--accent); }

  .welcome p {
    font-size: 15px; color: var(--muted);
    line-height: 1.6;
