<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lucci</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#11111f;
  --surface2:#18182a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --text:#eeeef5;
  --muted:#6b6b85;
  --muted2:#4a4a62;
  --accent:#a78bfa;
  --lime:#c8f060;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html{height:-webkit-fill-available;background:var(--bg)}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  background:var(--bg);color:var(--text);
  font-family:var(--font);display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
header{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  background:rgba(5,5,10,0.95);
}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{
  width:32px;height:32px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
}
.logo{font-size:18px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.logo em{font-style:normal;color:var(--accent)}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(200,240,96,0.08);
  border:1px solid rgba(200,240,96,0.15);
  border-radius:100px;padding:4px 10px;
  font-size:11px;color:var(--lime);
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{
  flex:1;overflow-y:auto;padding:24px 0 16px;
  position:relative;z-index:5;
  -webkit-overflow-scrolling:touch;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.inner{max-width:640px;margin:0 auto;padding:0 16px}
.welcome{padding:40px 0 32px;text-align:center;animation:fadeUp 0.6s ease both}
.welcome-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);
  border-radius:100px;padding:5px 14px;
  font-size:12px;color:var(--accent);margin-bottom:20px;
}
.welcome h1{
  font-size:clamp(30px,7vw,44px);font-weight:700;
  letter-spacing:-1.5px;line-height:1.1;margin-bottom:12px;
}
.welcome h1 .grad{
  background:linear-gradient(90deg,#a78bfa,#22d3ee,#c8f060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome p{font-size:15px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 28px}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.suggestion{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:9px 14px;
  font-size:13px;color:var(--muted);cursor:pointer;font-family:var(--font);
  transition:all 0.2s;text-align:left;
}
.suggestion:active{background:var(--surface2);color:var(--text);border-color:rgba(167,139,250,0.3)}
.s-icon{display:block;font-size:16px;margin-bottom:4px}
.msg{display:flex;gap:10px;margin-bottom:20px;animation:fadeUp 0.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;
}
.avatar.ai{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:13px}
.avatar.user-av{background:var(--surface2);border:1px solid var(--border2);color:var(--muted)}
.bubble{max-width:calc(100% - 48px);padding:11px 15px;font-size:15px;line-height:1.65}
.msg.ai .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;color:var(--text);
}
.msg.user .bubble{
  background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(167,139,250,0.15));
  border:1px solid rgba(167,139,250,0.2);
  border-radius:16px 4px 16px 16px;color:var(--text);
}
.bubble img{max-width:100%;border-radius:10px;margin-top:6px;display:block}
.typing{display:flex;gap:4px;align-items:center;padding:5px 2px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted2);animation:bounce 1.2s ease infinite}
.typing span:nth-child(2){animation-delay:0.15s}
.typing span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{
  position:relative;z-index:10;
  padding:12px 16px 28px;
  background:rgba(5,5,10,0.95);
  border-top:1px solid var(--border);
}
.input-outer{max-width:640px;margin:0 auto;position:relative}
.input-glow{
  position:absolute;inset:-1px;border-radius:17px;
  background:linear-gradient(135deg,#7c3aed,#22d3ee,#c8f060);
  opacity:0;transition:opacity 0.3s;z-index:0;
}
.input-outer.focused .input-glow{opacity:0.4}
.input-wrap{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;display:flex;align-items:flex-end;gap:8px;
  padding:10px 10px 10px 14px;
}
#user-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font);
  font-size:16px;line-height:1.5;
  resize:none;max-height:120px;padding:2px 0;
}
#user-input::placeholder{color:var(--muted2)}

/* IMAGE PREVIEW */
#image-preview-wrap{
  display:none;margin-bottom:8px;position:relative;width:fit-content;
}
#image-preview{
  max-height:80px;max-width:120px;border-radius:10px;
  border:1px solid var(--border2);display:block;
}
#clear-image{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:#333;border:none;color:#fff;
  font-size:11px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ATTACH BUTTON */
.attach-btn{
  width:36px;height:36px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
}
.attach-btn:active{opacity:0.7}
.attach-btn svg{width:16px;height:16px}

.send-btn{
  width:36px;height:36px;border-radius:12px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;opacity:0.35;
}
.send-btn.active{opacity:1}
.send-btn.active:active{transform:scale(0.93)}
.send-btn svg{width:15px;height:15px}
.input-hint{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:8px;font-size:11px;color:var(--muted2);
}
.hint-dot{width:3px;height:3px;border-radius:50%;background:var(--muted2)}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">L</div>
    <div class="logo">Lucci<em>.</em></div>
  </div>
  <div class="status-pill"><div class="dot"></div>Online</div>
</header>

<div id="chat">
  <div class="inner" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-badge">AI-powered assistant</div>
      <h1>Meet <span class="grad">Lucci</span></h1>
      <p>Your sharp personal AI. Direct answers, zero fluff.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)"><span class="s-icon">🔍</span>Search the web</button>
        <button class="suggestion" onclick="sendSuggestion(this)"><span class="s-icon">⏰</span>What time is it?</button>
        <button class="suggestion" onclick="sendSuggestion(this)"><span class="s-icon">💡</span>Business idea help</button>
        <button class="suggestion" onclick="sendSuggestion(this)"><span class="s-icon">📝</span>Save a note</button>
        <button class="suggestion" onclick="triggerImageUpload()"><span class="s-icon">👁️</span>Analyze an image</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-outer" id="input-outer">
    <div class="input-glow"></div>

    <!-- IMAGE PREVIEW -->
    <div id="image-preview-wrap">
      <img id="image-preview" src="" alt="preview"/>
      <button id="clear-image" onclick="clearImage()">✕</button>
    </div>

    <div class="input-wrap">
      <!-- ATTACH BUTTON -->
      <button class="attach-btn" onclick="triggerImageUpload()" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <!-- HIDDEN FILE INPUT -->
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)"/>

      <textarea id="user-input" rows="1" placeholder="Ask Lucci anything..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="input-hint">
    <span>Lucci AI</span><div class="hint-dot"></div>
    <span>May make mistakes</span><div class="hint-dot"></div>
    <span>Verify important info</span>
  </div>
</div>

<script>
const input=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const messages=document.getElementById('messages');
const chat=document.getElementById('chat');
const inputOuter=document.getElementById('input-outer');
let selectedImageFile = null;

input.addEventListener('focus',()=>inputOuter.classList.add('focused'));
input.addEventListener('blur',()=>inputOuter.classList.remove('focused'));
input.addEventListener('input',()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
  sendBtn.classList.toggle('active',input.value.trim().length>0||selectedImageFile!==null);
});
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});

function triggerImageUpload(){
  document.getElementById('image-input').click();
}

function handleImageSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  selectedImageFile = file;
  const reader = new FileReader();
  reader.onload = function(ev){
    document.getElementById('image-preview').src = ev.target.result;
    document.getElementById('image-preview-wrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
  sendBtn.classList.add('active');
}

function clearImage(){
  selectedImageFile = null;
  document.getElementById('image-input').value = '';
  document.getElementById('image-preview-wrap').style.display = 'none';
  document.getElementById('image-preview').src = '';
  sendBtn.classList.toggle('active', input.value.trim().length > 0);
}

function sendSuggestion(btn){
  const lines=btn.innerText.split('\n').map(l=>l.trim()).filter(Boolean);
  input.value=lines[lines.length-1];
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

function addMessage(role, text, imgSrc=null){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const msg=document.createElement('div');
  msg.className=`msg ${role}`;
  const avatar=document.createElement('div');
  avatar.className=`avatar ${role==='ai'?'ai':'user-av'}`;
  avatar.textContent=role==='ai'?'L':'Y';
  const bubble=document.createElement('div');
  bubble.className='bubble';
  if(imgSrc){
    const img=document.createElement('img');
    img.src=imgSrc;
    bubble.appendChild(img);
  }
  if(text){
    const t=document.createElement('span');
    t.textContent=text;
    bubble.appendChild(t);
  }
  msg.appendChild(avatar);msg.appendChild(bubble);
  messages.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function addTyping(){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const msg=document.createElement('div');
  msg.className='msg ai';msg.id='typing-msg';
  const avatar=document.createElement('div');
  avatar.className='avatar ai';avatar.textContent='L';
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  msg.appendChild(avatar);msg.appendChild(bubble);
  messages.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-msg');
  if(t)t.remove();
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text && !selectedImageFile) return;

  // If image is selected → send to /vision
  if(selectedImageFile){
    const previewSrc = document.getElementById('image-preview').src;
    addMessage('user', text || 'Analyze this image', previewSrc);
    input.value='';input.style.height='auto';
    sendBtn.classList.remove('active');
    const imageFile = selectedImageFile;
    const prompt = text || 'Describe and analyze this image in detail.';
    clearImage();
    addTyping();
    try{
      const formData = new FormData();
      formData.append('image', imageFile);
      formData.append('prompt', prompt);
      const res = await fetch('/vision',{method:'POST',body:formData});
      const data = await res.json();
      removeTyping();
      addMessage('ai', data.response);
    }catch(err){
      removeTyping();
      addMessage('ai','Vision analysis failed. Try again.');
    }
    return;
  }

  // Normal text message
  addMessage('user',text);
  input.value='';input.style.height='auto';
  sendBtn.classList.remove('active');
  addTyping();
  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:text})
    });
    const data=await res.json();
    removeTyping();
    addMessage('ai',data.response);
  }catch(err){
    removeTyping();
    addMessage('ai','Something went wrong. Try again.');
  }
}
</script>
</body>
</html>
