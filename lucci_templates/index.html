<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Lucci</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;
  --surface:#11111f;
  --surface2:#18182a;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --text:#eeeef5;
  --muted:#6b6b85;
  --muted2:#4a4a62;
  --accent:#a78bfa;
  --lime:#c8f060;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{
  display:flex;flex-direction:column;
  color:var(--text);font-family:var(--font);
}
header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(5,5,10,0.98);
  z-index:10;
}
.logo-wrap{display:flex;align-items:center;gap:8px}
.logo-icon{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
}
.logo{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.3px}
.logo em{font-style:normal;color:var(--accent)}
.status-pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(200,240,96,0.08);
  border:1px solid rgba(200,240,96,0.15);
  border-radius:100px;padding:4px 10px;
  font-size:11px;color:var(--lime);white-space:nowrap;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#chat{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:20px 0 12px;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.inner{max-width:640px;margin:0 auto;padding:0 14px}
.welcome{padding:32px 0 24px;text-align:center;animation:fadeUp 0.6s ease both}
.welcome-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);
  border-radius:100px;padding:5px 14px;
  font-size:12px;color:var(--accent);margin-bottom:16px;
}
.welcome h1{
  font-size:clamp(26px,8vw,40px);font-weight:700;
  letter-spacing:-1.5px;line-height:1.1;margin-bottom:10px;
}
.welcome h1 .grad{
  background:linear-gradient(90deg,#a78bfa,#22d3ee,#c8f060);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.welcome p{font-size:14px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto 20px}
.suggestions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  max-width:320px;
  margin:0 auto;
}
.suggestion{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:10px 12px;
  font-size:12px;color:var(--muted);cursor:pointer;font-family:var(--font);
  transition:all 0.2s;text-align:left;width:100%;
}
.suggestion:active{background:var(--surface2);color:var(--text);border-color:rgba(167,139,250,0.3)}
.s-icon{display:block;font-size:18px;margin-bottom:5px}
.s-label{display:block;line-height:1.3}
.msg{display:flex;gap:10px;margin-bottom:16px;animation:fadeUp 0.25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;
}
.avatar.ai{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.avatar.user-av{background:var(--surface2);border:1px solid var(--border2);color:var(--muted)}
.bubble{
  max-width:calc(100% - 42px);
  padding:10px 14px;font-size:14px;line-height:1.7;
  word-break:break-word;white-space:pre-wrap;
}
.msg.ai .bubble{
  background:var(--surface);border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;color:var(--text);
}
.msg.user .bubble{
  background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(167,139,250,0.15));
  border:1px solid rgba(167,139,250,0.2);
  border-radius:16px 4px 16px 16px;color:var(--text);
}
.bubble img{max-width:100%;border-radius:10px;margin-top:6px;display:block}
.cursor{
  display:inline-block;width:2px;height:14px;
  background:var(--accent);margin-left:2px;
  animation:blink 0.8s ease infinite;vertical-align:middle;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.typing{display:flex;gap:4px;align-items:center;padding:5px 2px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--muted2);animation:bounce 1.2s ease infinite}
.typing span:nth-child(2){animation-delay:0.15s}
.typing span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-area{
  flex-shrink:0;
  padding:10px 14px 22px;
  background:rgba(5,5,10,0.98);
  border-top:1px solid var(--border);
}
.input-outer{max-width:640px;margin:0 auto;position:relative}
.input-glow{
  position:absolute;inset:-1px;border-radius:17px;
  background:linear-gradient(135deg,#7c3aed,#22d3ee,#c8f060);
  opacity:0;transition:opacity 0.3s;z-index:0;
}
.input-outer.focused .input-glow{opacity:0.35}
.input-wrap{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:16px;display:flex;align-items:flex-end;gap:6px;
  padding:8px 8px 8px 12px;
}
#user-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font);
  font-size:16px;line-height:1.5;
  resize:none;max-height:100px;padding:2px 0;
}
#user-input::placeholder{color:var(--muted2)}
#image-preview-wrap{
  display:none;margin-bottom:6px;position:relative;width:fit-content;
}
#image-preview{
  max-height:70px;max-width:100px;border-radius:10px;
  border:1px solid var(--border2);display:block;
}
#clear-image{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;border-radius:50%;
  background:#444;border:none;color:#fff;
  font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.attach-btn{
  width:34px;height:34px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.attach-btn svg{width:15px;height:15px}
.send-btn{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;opacity:0.35;transition:opacity 0.2s;
}
.send-btn.active{opacity:1}
.send-btn.active:active{transform:scale(0.93)}
.send-btn svg{width:14px;height:14px}
.input-hint{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:7px;font-size:10px;color:var(--muted2);
}
.hint-dot{width:3px;height:3px;border-radius:50%;background:var(--muted2)}
.img-loading{
  width:100%;max-width:280px;height:280px;
  background:var(--surface2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:13px;margin-top:6px;
  border:1px solid var(--border2);
}
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo-icon">L</div>
    <div class="logo">Lucci<em>.</em></div>
  </div>
  <div class="status-pill"><div class="dot"></div>Online</div>
</header>

<div id="chat">
  <div class="inner" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-badge">✦ AI-powered assistant</div>
      <h1>Meet <span class="grad">Lucci</span></h1>
      <p>Your sharp personal AI. Direct answers, zero fluff.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">
          <span class="s-icon">🔍</span>
          <span class="s-label">Search the web</span>
        </button>
        <button class="suggestion" onclick="sendSuggestion(this)">
          <span class="s-icon">⏰</span>
          <span class="s-label">What time is it?</span>
        </button>
        <button class="suggestion" onclick="sendSuggestion(this)">
          <span class="s-icon">💡</span>
          <span class="s-label">Business idea help</span>
        </button>
        <button class="suggestion" onclick="sendSuggestion(this)">
          <span class="s-icon">📝</span>
          <span class="s-label">Save a note</span>
        </button>
        <button class="suggestion" onclick="triggerImageUpload()">
          <span class="s-icon">👁️</span>
          <span class="s-label">Analyze image</span>
        </button>
        <button class="suggestion" onclick="sendSuggestion(this)">
          <span class="s-icon">🎨</span>
          <span class="s-label">Generate image</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-outer" id="input-outer">
    <div class="input-glow"></div>
    <div id="image-preview-wrap">
      <img id="image-preview" src="" alt="preview"/>
      <button id="clear-image" onclick="clearImage()">✕</button>
    </div>
    <div class="input-wrap">
      <button class="attach-btn" onclick="triggerImageUpload()" title="Attach image">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <input type="file" id="image-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)"/>
      <textarea id="user-input" rows="1" placeholder="Ask Lucci anything..."></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="input-hint">
    <span>Lucci AI</span><div class="hint-dot"></div>
    <span>May make mistakes</span><div class="hint-dot"></div>
    <span>Verify important info</span>
  </div>
</div>

<script>
const input=document.getElementById('user-input');
const sendBtn=document.getElementById('send-btn');
const messages=document.getElementById('messages');
const chat=document.getElementById('chat');
const inputOuter=document.getElementById('input-outer');
let selectedImageFile=null;

input.addEventListener('focus',()=>inputOuter.classList.add('focused'));
input.addEventListener('blur',()=>inputOuter.classList.remove('focused'));
input.addEventListener('input',()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,100)+'px';
  sendBtn.classList.toggle('active',input.value.trim().length>0||selectedImageFile!==null);
});
input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}
});

function triggerImageUpload(){
  document.getElementById('image-input').click();
}

function handleImageSelect(e){
  const file=e.target.files[0];
  if(!file)return;
  selectedImageFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('image-preview').src=ev.target.result;
    document.getElementById('image-preview-wrap').style.display='block';
  };
  reader.readAsDataURL(file);
  sendBtn.classList.add('active');
}

function clearImage(){
  selectedImageFile=null;
  document.getElementById('image-input').value='';
  document.getElementById('image-preview-wrap').style.display='none';
  document.getElementById('image-preview').src='';
  sendBtn.classList.toggle('active',input.value.trim().length>0);
}

function sendSuggestion(btn){
  const label=btn.querySelector('.s-label');
  input.value=label?label.innerText:btn.innerText.trim();
  input.dispatchEvent(new Event('input'));
  sendMessage();
}

function addMessage(role,text,imgSrc=null){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const msg=document.createElement('div');
  msg.className=`msg ${role}`;
  const avatar=document.createElement('div');
  avatar.className=`avatar ${role==='ai'?'ai':'user-av'}`;
  avatar.textContent=role==='ai'?'L':'Y';
  const bubble=document.createElement('div');
  bubble.className='bubble';
  if(imgSrc){
    const img=document.createElement('img');
    img.src=imgSrc;
    bubble.appendChild(img);
  }
  if(text){
    const t=document.createElement('span');
    t.textContent=text;
    bubble.appendChild(t);
  }
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messages.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
  return bubble;
}

function addTyping(){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();
  const msg=document.createElement('div');
  msg.className='msg ai';msg.id='typing-msg';
  const avatar=document.createElement('div');
  avatar.className='avatar ai';avatar.textContent='L';
  const bubble=document.createElement('div');
  bubble.className='bubble';
  bubble.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  msg.appendChild(avatar);msg.appendChild(bubble);
  messages.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing-msg');
  if(t)t.remove();
}

async function streamChat(userText){
  const welcome=document.getElementById('welcome');
  if(welcome)welcome.remove();

  const msg=document.createElement('div');
  msg.className='msg ai';
  const avatar=document.createElement('div');
  avatar.className='avatar ai';avatar.textContent='L';
  const bubble=document.createElement('div');
  bubble.className='bubble';
  const textNode=document.createTextNode('');
  const cursor=document.createElement('span');
  cursor.className='cursor';
  bubble.appendChild(textNode);
  bubble.appendChild(cursor);
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messages.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;

  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message:userText})
    });

    const contentType=res.headers.get('content-type')||'';
    if(contentType.includes('application/json')){
      const data=await res.json();
      if(data.skip){
        msg.remove();
        return;
      }
      textNode.textContent=data.response;
      cursor.remove();
      chat.scrollTop=chat.scrollHeight;
      return;
    }

    const reader=res.body.getReader();
    const decoder=new TextDecoder();
    let buffer='';

    while(true){
      const {done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop();
      for(const line of lines){
        if(line.startsWith('data: ')){
          try{
            const parsed=JSON.parse(line.slice(6));
            if(parsed.token){
              textNode.textContent+=parsed.token;
              chat.scrollTop=chat.scrollHeight;
            }
            if(parsed.done){
              cursor.remove();
            }
          }catch(e){}
        }
      }
    }
  }catch(err){
    textNode.textContent='Something went wrong. Try again.';
    cursor.remove();
  }
}

async function sendMessage(){
  const text=input.value.trim();
  if(!text&&!selectedImageFile)return;

  // ── IMAGE GENERATION ──
  const generateTriggers=["generate","create image","draw","imagine","make an image","paint","an image","a picture","a photo","a cartoon","sketch","illustration","render","visualize"];
  const isGenerate=generateTriggers.some(t=>text.toLowerCase().includes(t));

  if(isGenerate){
    addMessage('user',text);
    input.value='';input.style.height='auto';
    sendBtn.classList.remove('active');

    const welcome=document.getElementById('welcome');
    if(welcome)welcome.remove();
    const msg=document.createElement('div');
    msg.className='msg ai';
    const avatar=document.createElement('div');
    avatar.className='avatar ai';avatar.textContent='L';
    const bubble=document.createElement('div');
    bubble.className='bubble';
    const loader=document.createElement('div');
    loader.className='img-loading';
    loader.textContent='🎨 Generating...';
    bubble.appendChild(loader);
    msg.appendChild(avatar);msg.appendChild(bubble);
    messages.appendChild(msg);
    chat.scrollTop=chat.scrollHeight;

    try{
      const res=await fetch('/imagine',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:text})
      });
      const data=await res.json();
      loader.remove();
      const label=document.createElement('span');
      label.textContent='🎨 Here you go:';
      label.style.display='block';
      label.style.marginBottom='6px';
      label.style.fontSize='13px';
      label.style.color='var(--muted)';
      const img=document.createElement('img');
      img.src=data.image_url;
      img.style.maxWidth='100%';
      img.style.borderRadius='12px';
      img.onload=()=>{chat.scrollTop=chat.scrollHeight};
      img.onerror=()=>{bubble.textContent='Image failed to load. Try a different prompt.'};
      bubble.appendChild(label);
      bubble.appendChild(img);
      chat.scrollTop=chat.scrollHeight;
    }catch(err){
      loader.textContent='Image generation failed. Try again.';
    }
    return;
  }

  // ── AI VISION ──
  if(selectedImageFile){
    const previewSrc=document.getElementById('image-preview').src;
    addMessage('user',text||'Analyze this image',previewSrc);
    input.value='';input.style.height='auto';
    sendBtn.classList.remove('active');
    const imageFile=selectedImageFile;
    const prompt=text||'Describe and analyze this image in detail.';
    clearImage();
    addTyping();
    try{
      const formData=new FormData();
      formData.append('image',imageFile);
      formData.append('prompt',prompt);
      const res=await fetch('/vision',{method:'POST',body:formData});
      const data=await res.json();
      removeTyping();
      addMessage('ai',data.response);
    }catch(err){
      removeTyping();
      addMessage('ai','Vision analysis failed. Try again.');
    }
    return;
  }

  // ── NORMAL STREAMING CHAT ──
  addMessage('user',text);
  input.value='';input.style.height='auto';
  sendBtn.classList.remove('active');
  await streamChat(text);
}
</script>
</body>
</html>
